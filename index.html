<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SONG, YOUNG-MIN Guitar Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #4E342E; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; }
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 18px; cursor: pointer; z-index: 100;
            background: #8D6E63; color: white; border: 2px solid #3E2723; border-radius: 10px;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <button id="start-btn">SONG, YOUNG-MIN Guitar Lab<br>(터치하여 시작)</button>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: '#3E2723', // 배경 유실 대비 기본색
            physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
            scene: { create: create, update: update }
        };

        let ball, tiles, audioCtx;
        let accelX = 0, accelY = 0;
        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];

        const game = new Phaser.Game(config);

        function create() {
            const centerX = this.cameras.main.centerX;
            const centerY = this.cameras.main.centerY;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // --- 1. 나무 바닥 질감 직접 그리기 ---
            const graphics = this.add.graphics();
            graphics.fillGradientStyle(0x4E342E, 0x4E342E, 0x2D1B18, 0x2D1B18, 1);
            graphics.fillRect(0, 0, config.width, config.height);
            // 나이테/판자 결 표현
            graphics.lineStyle(2, 0x3E2723, 0.5);
            for(let i=0; i<config.width; i+=40) { graphics.lineBetween(i, 0, i, config.height); }

            // --- 2. 쇠구슬 은색 그라디언트 텍스처 생성 ---
            const ballCanvas = this.make.graphics({x: 0, y: 0, add: false});
            ballCanvas.fillStyle(0xdddddd, 1);
            ballCanvas.fillCircle(25, 25, 25);
            // 은색 광택(그라디언트 대용 하이라이트)
            ballCanvas.fillStyle(0xffffff, 0.8);
            ballCanvas.fillCircle(15, 15, 8); 
            ballCanvas.lineStyle(2, 0x888888, 1);
            ballCanvas.strokeCircle(25, 25, 25);
            ballCanvas.generateTexture('silverBall', 50, 50);

            // --- 3. 나무 블럭 버튼 배치 ---
            tiles = this.add.group();
            const tileSize = 80;
            for (let i = 0; i < 12; i++) {
                let col = i % 3;
                let row = Math.floor(i / 3);
                let x = centerX + (col - 1) * (tileSize + 25);
                let y = centerY + (row - 1.5) * (tileSize + 25);

                // 나무 블럭 본체
                let block = this.add.rectangle(x, y, tileSize, tileSize, 0x8D6E63).setStrokeStyle(4, 0x5D4037);
                let txt = this.add.text(x, y, notes[i], { 
                    fontSize: '20px', color: '#3E2723', fontStyle: 'bold', fontFamily: '맑은 고딕' 
                }).setOrigin(0.5);

                block.setData({ freq: freqs[i], active: false, text: txt });
                tiles.add(block);
            }

            // --- 4. 쇠구슬 물리 설정 (중앙 배치) ---
            ball = this.physics.add.sprite(centerX, centerY, 'silverBall');
            ball.setCircle(25);
            ball.setCollideWorldBounds(true);
            ball.setBounce(0.3);
            ball.setDrag(100);
            ball.setDamping(true);
            ball.setDepth(10);

            // --- 5. 워터마크 (중앙 하단) ---
            this.add.text(centerX, config.height - 50, "SONG, YOUNG-MIN Guitar Lab", {
                fontSize: '16px', color: '#ffffff', alpha: 0.5, fontFamily: '맑은 고딕'
            }).setOrigin(0.5);

            // 30초 셔플 타이머
            this.time.addEvent({ delay: 30000, callback: shuffleTiles, callbackScope: this, loop: true });

            // 자이로 센서 핸들러
            window.addEventListener('deviceorientation', (e) => {
                // 평평하게 들었을 때를 기준(0)으로 가속도 계산
                accelX = e.gamma * 40; 
                accelY = (e.beta - 45) * 40; // 45도 각도로 들고 있다고 가정
            });
        }

        function shuffleTiles() {
            const centerX = this.cameras.main.centerX;
            const centerY = this.cameras.main.centerY;
            const tileSize = 80;
            let pos = [];
            for (let i = 0; i < 12; i++) {
                let col = i % 3;
                let row = Math.floor(i / 3);
                pos.push({ x: centerX + (col - 1) * (tileSize + 25), y: centerY + (row - 1.5) * (tileSize + 25) });
            }
            Phaser.Actions.Shuffle(pos);

            tiles.getChildren().forEach((tile, index) => {
                this.tweens.add({
                    targets: [tile, tile.getData('text')],
                    x: pos[index].x, y: pos[index].y,
                    duration: 1000, ease: 'Power2'
                });
            });
        }

        function update() {
            if (ball) {
                ball.setAccelerationX(accelX);
                ball.setAccelerationY(accelY);

                // 구슬이 타일 위에 있는지 거리 체크
                tiles.getChildren().forEach(tile => {
                    let dist = Phaser.Math.Distance.Between(ball.x, ball.y, tile.x, tile.y);
                    if (dist < 40 && !tile.getData('active')) {
                        tile.setData('active', true);
                        
                        // 버튼 눌림 애니메이션
                        this.tweens.add({
                            targets: [tile, tile.getData('text')],
                            scale: 0.9, y: '+=4', duration: 100, yoyo: true,
                            onStart: () => playNote(tile.getData('freq')),
                            onComplete: () => tile.setData('active', false)
                        });
                    }
                });
            }
        }

        function playNote(freq) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
        }

        document.getElementById('start-btn').onclick = function() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') {
                        audioCtx.resume();
                        this.style.display = 'none';
                    }
                });
            } else {
                audioCtx.resume();
                this.style.display = 'none';
            }
        };
    </script>
</body>
</html>
