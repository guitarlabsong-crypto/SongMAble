<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SONG, YOUNG-MIN Guitar Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #3E2723; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; }
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 18px; cursor: pointer; z-index: 1000;
            background: #8D6E63; color: #ffffff; border: 2px solid #5D4037; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
        }
    </style>
</head>
<body>
    <button id="start-btn">SONG, YOUNG-MIN Guitar Lab<br>터치하여 시작</button>

    <script>
        let ball, ballContainer, waterFill, tiles, audioCtx;
        let accelX = 0, accelY = 0, baseBeta = null;

        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];

        const config = {
            type: Phaser.AUTO,
            backgroundColor: '#3E2723',
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: window.innerWidth, height: window.innerHeight },
            physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
            scene: { create: create, update: update }
        };

        const game = new Phaser.Game(config);

        function create() {
            const { width, height } = this.scale;
            const centerX = width / 2;
            const centerY = height / 2;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // 1. 텍스처 생성
            createWoodTexture(this);
            
            // 배경
            this.add.tileSprite(centerX, centerY, width, height, 'woodTex').setAlpha(0.4);

            // 2. 입체 블록 생성
            tiles = this.add.group();
            const tileSize = Math.min(width, height) * 0.18;

            for (let i = 0; i < 12; i++) {
                let col = i % 3; let row = Math.floor(i / 3);
                let x = centerX + (col - 1) * (tileSize * 1.3);
                let y = centerY + (row - 1.5) * (tileSize * 1.3);

                let container = this.add.container(x, y);
                let shadow = this.add.rectangle(5, 5, tileSize, tileSize, 0x000000, 0.4);
                let side = this.add.rectangle(0, 6, tileSize, tileSize, 0x4E342E);
                let top = this.add.sprite(0, 0, 'woodTex').setDisplaySize(tileSize, tileSize);
                let txt = this.add.text(0, 0, notes[i], { fontSize: (tileSize * 0.3) + 'px', color: '#2D1B18', fontStyle: 'bold' }).setOrigin(0.5);

                container.add([shadow, side, top, txt]);
                container.setData({ freq: freqs[i], isOver: false, top: top, txt: txt });
                this.physics.add.existing(container);
                container.body.setSize(tileSize, tileSize);
                tiles.add(container);
            }

            // 3. 워터 볼(구슬) 구성
            ballContainer = this.add.container(centerX, centerY);
            
            // 구슬 외각 유리
            const glass = this.add.graphics();
            glass.lineStyle(2, 0xffffff, 0.7).strokeCircle(0, 0, 25);
            glass.fillStyle(0xffffff, 0.1).fillCircle(0, 0, 25);
            
            // 구슬 내부 물 (반정도 채움)
            waterFill = this.add.graphics();
            
            // 물이 구슬 밖으로 나가지 않게 마스크 생성
            const maskShape = this.make.graphics().fillCircle(0, 0, 24).createGeometryMask();
            waterFill.setMask(maskShape);

            // 반사광
            const shine = this.add.graphics();
            shine.fillStyle(0xffffff, 0.4).fillCircle(-8, -8, 6);

            ballContainer.add([glass, waterFill, shine]);
            
            // 물리 적용을 위한 가상 스프라이트 (히트박스)
            ball = this.physics.add.sprite(centerX, centerY, null);
            ball.setCircle(25).setCollideWorldBounds(true).setBounce(0.5).setVisible(false);

            // 30초 셔플
            this.time.addEvent({ delay: 30000, callback: shuffleTiles, callbackScope: this, loop: true });
        }

        function createWoodTexture(scene) {
            const woodG = scene.make.graphics({x: 0, y: 0, add: false});
            woodG.fillStyle(0x8D6E63, 1).fillRect(0, 0, 200, 200);
            for(let i=0; i<200; i+=10) {
                woodG.lineStyle(1, 0x5D4037, 0.3);
                woodG.lineBetween(i, 0, i + (Math.random()*10), 200);
            }
            woodG.generateTexture('woodTex', 200, 200);
        }

        function update() {
            if (ball) {
                ball.setVelocityX(accelX * 1.5);
                ball.setVelocityY(accelY * 1.5);

                // 실제 구슬 그래픽을 물리 히트박스 위치로 이동
                ballContainer.x = ball.x;
                ballContainer.y = ball.y;

                // 물 드로잉 (중력 방향에 맞춰 출렁임)
                drawWater();

                tiles.getChildren().forEach(container => {
                    const distance = Phaser.Math.Distance.Between(ball.x, ball.y, container.x, container.y);
                    if (distance < 50) {
                        if (!container.getData('isOver')) {
                            container.setData('isOver', true);
                            pressButton.call(this, container);
                        }
                    } else {
                        container.setData('isOver', false);
                    }
                });
            }
        }

        function drawWater() {
            waterFill.clear();
            waterFill.fillStyle(0x4FC3F7, 0.6); // 물 색상
            
            // 중력(가속도)에 따라 수면의 기울기 계산
            let angle = Math.atan2(accelY, accelX);
            // 수위 조절 (반 정도 차게 함)
            waterFill.beginPath();
            // 각도에 따른 수면의 위치 계산 (간단한 수평선 유지 로직)
            waterFill.arc(0, 0, 25, angle, angle + Math.PI); 
            waterFill.closePath();
            waterFill.fillPath();
        }

        function shuffleTiles() {
            const { width, height } = this.scale;
            const tileSize = Math.min(width, height) * 0.18;
            let pos = [];
            for (let i = 0; i < 12; i++) {
                let col = i % 3; let row = Math.floor(i / 3);
                pos.push({ x: (width/2) + (col - 1) * (tileSize * 1.3), y: (height/2) + (row - 1.5) * (tileSize * 1.3) });
            }
            Phaser.Actions.Shuffle(pos);
            tiles.getChildren().forEach((c, i) => {
                this.tweens.add({ targets: c, x: pos[i].x, y: pos[i].y, duration: 800, ease: 'Power2' });
            });
        }

        function pressButton(container) {
            const top = container.getData('top');
            const txt = container.getData('txt');
            playNote(container.getData('freq'));
            this.tweens.add({ targets: [top, txt], y: 5, duration: 80, yoyo: true });
        }

        function playNote(freq) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.6);
        }

        const startBtn = document.getElementById('start-btn');
        startBtn.onclick = function() {
            if (audioCtx) audioCtx.resume();
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') { initSensor(); startBtn.style.display = 'none'; }
                });
            } else { initSensor(); startBtn.style.display = 'none'; }
        };

        function initSensor() {
            window.addEventListener('deviceorientation', (e) => {
                if (baseBeta === null) baseBeta = e.beta;
                accelX = e.gamma * 20; 
                accelY = (e.beta - baseBeta) * 20;
            });
        }
    </script>
</body>
</html>
