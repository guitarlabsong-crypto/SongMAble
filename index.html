<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SONG, YOUNG-MIN Guitar Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #2D1B18; }
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 18px; cursor: pointer; z-index: 1000;
            background: #5D4037; color: #D7CCC8; border: 1px solid #8D6E63; border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8); text-align: center;
        }
    </style>
</head>
<body>
    <button id="start-btn">SONG, YOUNG-MIN Guitar Lab<br>터치하여 시작</button>

    <script>
        let ball, tiles, audioCtx;
        let accelX = 0, accelY = 0, baseBeta = null;

        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];

        const config = {
            type: Phaser.AUTO,
            backgroundColor: '#2D1B18',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: window.innerWidth,
                height: window.innerHeight
            },
            physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
            scene: { create: create, update: update }
        };

        const game = new Phaser.Game(config);

        function create() {
            const width = this.scale.width;
            const height = this.scale.height;
            const centerX = width / 2;
            const centerY = height / 2;

            // 1. 나무 질감 텍스처 생성 (나이테 복구)
            const woodG = this.make.graphics({x: 0, y: 0, add: false});
            woodG.fillStyle(0x8D6E63, 1).fillRect(0, 0, 256, 256);
            for(let i=0; i<256; i+=8) {
                woodG.lineStyle(1, 0x4E342E, 0.3);
                woodG.beginPath();
                woodG.moveTo(i, 0);
                woodG.bezierCurveTo(i+10, 80, i-10, 170, i, 256);
                woodG.strokePath();
            }
            woodG.generateTexture('woodTex', 256, 256);

            // 2. LED 글로우 텍스처 (은은한 버전)
            const ledG = this.make.graphics({x: 0, y: 0, add: false});
            for(let r = 50; r > 0; r--) {
                ledG.fillStyle(0xFF8F00, (50 - r) / 800);
                ledG.fillCircle(50, 50, r);
            }
            ledG.generateTexture('softLED', 100, 100);

            // 3. 유리구슬 텍스처
            const glassG = this.make.graphics({x: 0, y: 0, add: false});
            glassG.lineStyle(2, 0xffffff, 0.4).strokeCircle(25, 25, 23);
            glassG.fillStyle(0xffffff, 0.1).fillCircle(25, 25, 23);
            glassG.fillStyle(0xffffff, 0.5).fillCircle(18, 18, 7);
            glassG.generateTexture('glassBall', 50, 50);

            // 배경 설정
            this.add.tileSprite(centerX, centerY, width, height, 'woodTex').setAlpha(0.1);

            // 블록 그룹 생성
            tiles = this.add.group();
            const tileSize = Math.min(width, height) * 0.18;

            for (let i = 0; i < 12; i++) {
                let col = i % 3;
                let row = Math.floor(i / 3);
                let x = centerX + (col - 1) * (tileSize * 1.35);
                let y = centerY + (row - 1.5) * (tileSize * 1.35);

                let container = this.add.container(x, y);
                let led = this.add.sprite(0, 0, 'softLED').setAlpha(0).setScale(1.5);
                let shadow = this.add.rectangle(4, 4, tileSize, tileSize, 0x000000, 0.3);
                let side = this.add.rectangle(0, 5, tileSize, tileSize, 0x3E2723);
                let top = this.add.sprite(0, 0, 'woodTex').setDisplaySize(tileSize, tileSize).setTint(0x8D6E63);
                let txt = this.add.text(0, 0, notes[i], { 
                    fontSize: (tileSize * 0.25) + 'px', color: '#261411', fontStyle: 'bold' 
                }).setOrigin(0.5);

                container.add([led, shadow, side, top, txt]);
                container.setData({ freq: freqs[i], isOver: false, led, top, txt });
                
                this.physics.add.existing(container);
                container.body.setSize(tileSize, tileSize);
                tiles.add(container);
            }

            // 구슬 생성
            ball = this.physics.add.sprite(centerX, centerY, 'glassBall');
            ball.setCircle(25).setCollideWorldBounds(true).setBounce(0.5).setDepth(100);

            // 하단 텍스트
            this.add.text(centerX, height - 40, "SONG, YOUNG-MIN Guitar Lab", {
                fontSize: '14px', color: '#8D6E63', alpha: 0.5
            }).setOrigin(0.5);

            // 30초 셔플
            this.time.addEvent({ delay: 30000, callback: shuffleTiles, callbackScope: this, loop: true });
        }

        function shuffleTiles() {
            const { width, height } = this.scale;
            const tileSize = Math.min(width, height) * 0.18;
            let pos = [];
            for (let i = 0; i < 12; i++) {
                let col = i % 3; let row = Math.floor(i / 3);
                pos.push({ x: (width/2) + (col-1)*(tileSize*1.35), y: (height/2) + (row-1.5)*(tileSize*1.35) });
            }
            Phaser.Actions.Shuffle(pos);
            tiles.getChildren().forEach((c, i) => {
                this.tweens.add({ targets: c, x: pos[i].x, y: pos[i].y, duration: 800, ease: 'Cubic.out' });
            });
        }

        function update() {
            if (ball) {
                ball.setVelocityX(accelX);
                ball.setVelocityY(accelY);

                tiles.getChildren().forEach(container => {
                    const dist = Phaser.Math.Distance.Between(ball.x, ball.y, container.x, container.y);
                    if (dist < 45 && !container.getData('isOver')) {
                        container.setData('isOver', true);
                        pressEffect(container, true);
                    } else if (dist > 55 && container.getData('isOver')) {
                        container.setData('isOver', false);
                        pressEffect(container, false);
                    }
                });
            }
        }

        function pressEffect(container, isPressed) {
            const led = container.getData('led');
            const top = container.getData('top');
            const txt = container.getData('txt');

            if (isPressed) {
                playFlute(container.getData('freq'));
                game.scene.scenes[0].tweens.add({ targets: led, alpha: 0.5, duration: 100 });
                game.scene.scenes[0].tweens.add({ targets: [top, txt], y: 4, duration: 80 });
                top.setTint(0xA1887F);
            } else {
                game.scene.scenes[0].tweens.add({ targets: led, alpha: 0, duration: 300 });
                game.scene.scenes[0].tweens.add({ targets: [top, txt], y: 0, duration: 150 });
                top.setTint(0x8D6E63);
            }
        }

        function playFlute(freq) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            [1, 2, 3].forEach(m => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq * m, now);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.12 / m, now + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(now + 1.3);
            });
        }

        // --- 권한 및 센서 초기화 ---
        const startBtn = document.getElementById('start-btn');
        startBtn.onclick = function() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') {
                            initSensor();
                            startBtn.style.display = 'none';
                        }
                    });
            } else {
                initSensor();
                startBtn.style.display = 'none';
            }
        };

        function initSensor() {
            window.addEventListener('deviceorientation', (e) => {
                if (baseBeta === null) baseBeta = e.beta;
                accelX = e.gamma * 22; 
                accelY = (e.beta - baseBeta) * 22;
            }, true);
        }
    </script>
</body>
</html>
