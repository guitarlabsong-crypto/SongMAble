<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gyro Sound Sphere</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #5D4037; }
        canvas { display: block; }
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 20px; cursor: pointer; z-index: 10;
        }
    </style>
</head>
<body>
    <button id="start-btn">게임 시작 (센서 권한 허용)</button>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: '#5D4037', // 갈색 배경
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 0 } }
            },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let ball, tiles, infoText;
        let accelX = 0, accelY = 0;

        function preload() {
            // 소리 소스 (예시: 간단한 신시사이저 비프음 대용)
            // 실제 프로젝트 시에는 12개의 음원 파일을 로드해야 합니다.
            for (let i = 0; i < 12; i++) {
                this.load.audio(`note_${i}`, `https://examples.phaser.io/assets/audio/SoundEffects/key.wav`);
            }
        }

        function create() {
            const centerX = this.cameras.main.centerX;
            const centerY = this.cameras.main.centerY;

            // 1. 12개 타일 배치 (3x4 배열)
            tiles = this.physics.add.staticGroup();
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            const tileSize = 80;
            const spacing = 20;

            for (let i = 0; i < 12; i++) {
                let col = i % 3;
                let row = Math.floor(i / 3);
                let x = centerX + (col - 1) * (tileSize + spacing);
                let y = centerY + (row - 1.5) * (tileSize + spacing);

                let tile = this.add.rectangle(x, y, tileSize, tileSize, 0x8D6E63).setStrokeStyle(2, 0xffffff);
                tile.setData('note', notes[i]);
                tile.setData('index', i);
                tiles.add(tile);

                this.add.text(x, y, notes[i], { fontSize: '16px', color: '#fff' }).setOrigin(0.5);
            }

            // 2. 중앙 쇠구슬 생성
            ball = this.physics.add.circle(centerX, centerY, 15, 0x90A4AE);
            ball.setCollideWorldBounds(true);
            ball.setBounce(0.5);

            // 3. 워터마크
            this.add.text(window.innerWidth - 20, window.innerHeight - 20, "SONG LAB", {
                fontSize: '24px', color: '#ffffff', alpha: 0.3
            }).setOrigin(1);

            // 4. 자이로 센서 이벤트 리스너
            window.addEventListener('deviceorientation', (event) => {
                // beta: 앞뒤 기울기 (-180~180), gamma: 좌우 기울기 (-90~90)
                accelX = event.gamma * 15; 
                accelY = event.beta * 15;
            });

            // 타일 충돌 감지 (Overlap)
            this.physics.add.overlap(ball, tiles, (obj1, tile) => {
                if (!tile.getData('active')) {
                    tile.setData('active', true);
                    tile.setFillStyle(0xFFAB91); // 밟았을 때 색상 변경
                    this.sound.play(`note_${tile.getData('index')}`, { volume: 0.5 });
                    
                    // 잠시 후 색상 복구
                    this.time.delayedCall(200, () => {
                        tile.setFillStyle(0x8D6E63);
                        tile.setData('active', false);
                    });
                }
            });
        }

        function update() {
            // 자이로 값을 속도에 반영
            ball.setVelocityX(accelX);
            ball.setVelocityY(accelY);
        }

        // iOS 등 보안 정책을 위한 시작 버튼 처리
        document.getElementById('start-btn').onclick = function() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            this.style.display = 'none';
                        }
                    });
            } else {
                this.style.display = 'none';
            }
        };
    </script>
</body>
</html>
