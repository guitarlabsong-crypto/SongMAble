<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SONG, YOUNG-MIN Guitar Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #3E2723; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; }
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 18px; cursor: pointer; z-index: 100;
            background: #5D4037; color: #D7CCC8; border: 2px solid #8D6E63; border-radius: 5px;
        }
    </style>
</head>
<body>
    <button id="start-btn">SONG, YOUNG-MIN Guitar Lab</button>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
            scene: { create: create, update: update }
        };

        let ball, tiles, audioCtx;
        let accelX = 0, accelY = 0;
        // 초기 센서 기준점 저장 변수
        let baseBeta = null; 

        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];

        const game = new Phaser.Game(config);

        function create() {
            const centerX = this.cameras.main.centerX;
            const centerY = this.cameras.main.centerY;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // 1. 배경 드로잉
            const bg = this.add.graphics();
            bg.fillGradientStyle(0x4E342E, 0x4E342E, 0x3E2723, 0x3E2723, 1);
            bg.fillRect(0, 0, config.width, config.height);

            // 2. 투명 유리구슬 생성
            const glass = this.make.graphics({x: 0, y: 0, add: false});
            glass.lineStyle(2, 0xffffff, 0.6).strokeCircle(25, 25, 23);
            glass.fillStyle(0xffffff, 0.2).fillCircle(25, 25, 23);
            glass.fillStyle(0xffffff, 0.5).fillCircle(18, 18, 7);
            glass.generateTexture('glassBall', 50, 50);

            // 3. 나무 블록 컨테이너 생성 (텍스트와 블록을 하나로 결합)
            tiles = this.add.group();
            const tileSize = 85;
            for (let i = 0; i < 12; i++) {
                let col = i % 3;
                let row = Math.floor(i / 3);
                let x = centerX + (col - 1) * (tileSize + 30);
                let y = centerY + (row - 1.5) * (tileSize + 30);

                // 컨테이너로 묶어서 관리
                let container = this.add.container(x, y);
                let block = this.add.rectangle(0, 0, tileSize, tileSize, 0x8D6E63).setStrokeStyle(3, 0x5D4037);
                let txt = this.add.text(0, 0, notes[i], { 
                    fontSize: '22px', color: '#3E2723', fontStyle: 'bold', fontFamily: '맑은 고딕' 
                }).setOrigin(0.5);

                container.add([block, txt]);
                container.setData({ freq: freqs[i], active: false, initialX: x, initialY: y });
                
                // 물리 바디 수동 추가
                this.physics.add.existing(container);
                container.body.setImmovable(true);
                tiles.add(container);
            }

            // 4. 구슬 생성
            ball = this.physics.add.sprite(centerX, centerY, 'glassBall');
            ball.setCircle(25).setCollideWorldBounds(true).setBounce(0.5).setDepth(10);

            // 5. 워터마크 하단 중앙
            this.add.text(centerX, config.height - 50, "SONG, YOUNG-MIN Guitar Lab", {
                fontSize: '18px', color: '#ffffff', alpha: 0.5, fontFamily: '맑은 고딕'
            }).setOrigin(0.5);

            // 30초 셔플 타이머
            this.time.addEvent({ delay: 30000, callback: shuffleTiles, callbackScope: this, loop: true });

            // 6. 센서 이벤트 (중력 보정 로직 추가)
            window.addEventListener('deviceorientation', (e) => {
                if (baseBeta === null) baseBeta = e.beta; // 첫 각도를 0점으로 기록
                accelX = e.gamma * 25; 
                accelY = (e.beta - baseBeta) * 25; // 현재 각도에서 시작 각도를 뺌
            });
        }

        function shuffleTiles() {
            const centerX = this.cameras.main.centerX;
            const centerY = this.cameras.main.centerY;
            const tileSize = 85;
            let pos = [];
            for (let i = 0; i < 12; i++) {
                let col = i % 3;
                let row = Math.floor(i / 3);
                pos.push({ x: centerX + (col - 1) * (tileSize + 30), y: centerY + (row - 1.5) * (tileSize + 30) });
            }
            Phaser.Actions.Shuffle(pos);

            tiles.getChildren().forEach((container, index) => {
                this.tweens.add({
                    targets: container,
                    x: pos[index].x, y: pos[index].y,
                    duration: 1000, ease: 'Cubic.easeInOut'
                });
            });
        }

        function update() {
            if (ball) {
                ball.setVelocityX(accelX);
                ball.setVelocityY(accelY);

                // 구슬과 컨테이너 충돌/겹침 확인
                this.physics.overlap(ball, tiles, (b, container) => {
                    if (!container.getData('active')) {
                        container.setData('active', true);
                        playNote(container.getData('freq'));
                        
                        this.tweens.add({
                            targets: container,
                            scale: 0.85, duration: 100, yoyo: true,
                            onComplete: () => container.setData('active', false)
                        });
                    }
                });
            }
        }

        function playNote(freq) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
        }

        document.getElementById('start-btn').onclick = function() {
            baseBeta = null; // 버튼 누를 때의 각도를 다시 0점으로 잡음
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') {
                        if (audioCtx) audioCtx.resume();
                        this.style.display = 'none';
                    }
                });
            } else {
                if (audioCtx) audioCtx.resume();
                this.style.display = 'none';
            }
        };
    </script>
</body>
</html>
