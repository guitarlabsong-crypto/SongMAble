<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SONG,YOUNG-MIN Guitar Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        /* 기본 배경색 및 전체 화면 설정 */
        body { margin: 0; overflow: hidden; background-color: #3E2723; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; }
        /* 시작 버튼 스타일: 중앙 배치 및 입체감 부여 */
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 22px 45px; font-size: 18px; cursor: pointer; z-index: 1000;
            background: #8D6E63; color: #ffffff; border: 2px solid #5D4037; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
        }
    </style>
</head>
<body>
    <button id="start-btn">SONG,YOUNG-MIN Guitar Lab<br> 터치하여 Play </button>

    <script>
        // 전역 변수 선언: 구슬, 블록그룹, 오디오컨텍스트, 리버브 전송 통로 등
        let ball, tiles, audioCtx, reverbBus;
        let accelX = 0, accelY = 0, baseBeta = null; // 가속도 및 자이로 초기값

        // 음악 데이터: 12음계 이름과 각 음의 주파수(Hz)
        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];

        // Phaser 게임 설정 객체
        const config = {
            type: Phaser.AUTO, // 브라우저 환경에 따라 WebGL 또는 Canvas 자동 선택
            backgroundColor: '#3E2723', // 게임 배경색
            scale: {
                mode: Phaser.Scale.FIT, // 화면 크기에 맞게 자동 조절
                autoCenter: Phaser.Scale.CENTER_BOTH, // 중앙 정렬
                width: window.innerWidth, // 현재 화면 너비 적용
                height: window.innerHeight // 현재 화면 높이 적용
            },
            physics: { default: 'arcade', arcade: { gravity: { y: 0 } } }, // 물리 엔진 설정(중력 0)
            scene: { create: create, update: update } // 실행 단계별 함수 연결
        };

        // 게임 인스턴스 생성
        const game = new Phaser.Game(config);

        function create() {
            const { width, height } = this.scale; // 화면 크기 변수화
            const centerX = width / 2; // 가로 중앙값
            const centerY = height / 2; // 세로 중앙값

            setupAudio(); // 오디오 환경(리버브 포함) 초기 설정 호출

            // 1. 나무 질감 텍스처 동적 생성
            const woodG = this.make.graphics({x: 0, y: 0, add: false}); // 임시 그래픽 객체
            woodG.fillStyle(0x8D6E63, 1).fillRect(0, 0, 200, 200); // 기본 바탕색
            for(let i=0; i<200; i+=10) { // 나이테 느낌의 선 그리기
                woodG.lineStyle(1, 0x5D4037, 0.3);
                woodG.lineBetween(i, 0, i + (Math.random()*15), 200);
            }
            woodG.generateTexture('woodTex', 200, 200); // 생성한 그래픽을 'woodTex'라는 이름으로 등록

            // 2. 배경 바닥 이미지 배치
            this.add.tileSprite(centerX, centerY, width, height, 'woodTex').setAlpha(0.35);

            // 3. 입체 블록 생성 및 그룹화
            tiles = this.add.group(); // 블록들을 한꺼번에 관리할 그룹
            const tileSize = Math.min(width, height) * 0.18; // 블록 크기를 화면 비례로 설정

            for (let i = 0; i < 12; i++) {
                let col = i % 3; // 3열 구성
                let row = Math.floor(i / 3); // 행 계산
                let x = centerX + (col - 1) * (tileSize * 1.35); // X 좌표 배치
                let y = centerY + (row - 1.5) * (tileSize * 1.35); // Y 좌표 배치

                let container = this.add.container(x, y); // 블록 요소(그림자, 본체, 글자)를 담을 컨테이너
                let shadow = this.add.rectangle(5, 5, tileSize, tileSize, 0x000000, 0.4); // 블록 아래 그림자
                let side = this.add.rectangle(0, 6, tileSize, tileSize, 0x4E342E); // 블록의 두께(측면)
                let top = this.add.sprite(0, 0, 'woodTex').setDisplaySize(tileSize, tileSize); // 블록 윗면(나무)
                let txt = this.add.text(0, 0, notes[i], { // 음계 텍스트
                    fontSize: (tileSize * 0.32) + 'px', color: '#2D1B18', fontStyle: 'bold' 
                }).setOrigin(0.5);

                container.add([shadow, side, top, txt]); // 컨테이너에 순서대로 삽입
                container.setData({ freq: freqs[i], isOver: false, top, txt }); // 컨테이너에 데이터(주파수 등) 저장
                this.physics.add.existing(container); // 컨테이너에 물리 법칙 적용
                container.body.setSize(tileSize, tileSize); // 물리 충돌 영역 설정
                tiles.add(container); // 그룹에 블록 추가
            }

            // 4. 큰 유리 구슬 생성 (1.5배 크기)
            const glassG = this.make.graphics({x: 0, y: 0, add: false}); // 임시 그래픽
            glassG.lineStyle(3, 0xffffff, 0.6).strokeCircle(38, 38, 35); // 외곽선
            glassG.fillStyle(0xffffff, 0.15).fillCircle(38, 38, 35); // 내부 반투명
            glassG.fillStyle(0xffffff, 0.6).fillCircle(25, 25, 12); // 하이라이트(광택)
            glassG.generateTexture('glassBallLarge', 76, 76); // 'glassBallLarge'로 등록

            ball = this.physics.add.sprite(centerX, centerY, 'glassBallLarge'); // 화면에 구슬 생성
            ball.setCircle(38).setCollideWorldBounds(true).setBounce(0.5).setDepth(100); // 원형 충돌, 튕김 설정

            // 5. 워터마크 하단 배치
            this.add.text(centerX, height - 40, "SONG,YOUNG-MIN Guitar Lab"<br>"Jamsil Flute Artlounge", {
                fontSize: '18px', color: '#ffffff', alpha: 0.5, fontStyle: 'bold'
            }).setOrigin(0.5);

            // 30초마다 블록 위치를 무작위로 섞는 이벤트
            this.time.addEvent({ delay: 30000, callback: shuffleTiles, callbackScope: this, loop: true });
        }

        // Web Audio API를 활용한 리버브(잔향) 환경 구축 함수
        function setupAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)(); // 오디오 엔진 생성
            reverbBus = audioCtx.createGain(); // 모든 소리가 거쳐갈 메인 통로
            const delay = audioCtx.createDelay(); // 소리를 늦게 내보내는 노드
            const feedback = audioCtx.createGain(); // 늦춰진 소리를 다시 반복시키는 노드
            const filter = audioCtx.createBiquadFilter(); // 잔향의 음색을 조절하는 필터

            delay.delayTime.value = 0.15; // 0.15초 뒤에 잔향 시작
            feedback.gain.value = 0.4;    // 잔향이 반복되는 세기
            filter.frequency.value = 2000; // 2000Hz 이상의 맑은 소리만 잔향으로 남김

            reverbBus.connect(delay); // 소리 -> 딜레이 연결
            delay.connect(feedback); // 딜레이 -> 피드백 연결
            feedback.connect(filter); // 피드백 -> 필터 연결
            filter.connect(delay); // 필터 -> 다시 딜레이로 (순환 구조: 울림 발생)
            filter.connect(audioCtx.destination); // 잔향 결과물을 스피커로 전송
            reverbBus.connect(audioCtx.destination); // 원본 소리도 스피커로 전송
        }

        function update() { // 매 프레임마다 실행(초당 약 60번)
            if (ball) {
                ball.setVelocityX(accelX * 1.8); // 가속도에 따른 구슬 X축 속도 제어
                ball.setVelocityY(accelY * 1.8); // 가속도에 따른 구슬 Y축 속도 제어

                tiles.getChildren().forEach(container => { // 모든 블록을 순회하며 충돌 체크
                    const distance = Phaser.Math.Distance.Between(ball.x, ball.y, container.x, container.y);
                    if (distance < 65) { // 구슬이 커졌으므로 인식 거리 확대 (화음 유도)
                        if (!container.getData('isOver')) { // 새로 밟았을 때
                            container.setData('isOver', true);
                            activateBlock(container); // 블록 켜기 효과 실행
                        }
                    } else { // 블록에서 벗어났을 때
                        if (container.getData('isOver')) {
                            container.setData('isOver', false);
                            deactivateBlock(container); // 블록 끄기 효과 실행
                        }
                    }
                });
            }
        }

        function activateBlock(container) { // 블록을 밟았을 때 연출
            const top = container.getAt(2); // 블록 윗면 이미지 객체
            const txt = container.getAt(3); // 텍스트 객체
            playFluteReverb(container.getData('freq')); // 해당 음 재생
            txt.setColor('#FFF9C4'); // 텍스트 색상을 전구색으로 변경
            txt.setShadow(0, 0, '#FFD54F', 15, true, true); // 전구 발광(Glow) 효과 부여
            game.scene.scenes[0].tweens.add({ targets: [top, txt], y: 6, duration: 80 }); // 블록이 눌리는 애니메이션
        }

        function deactivateBlock(container) { // 블록에서 발을 뗐을 때 연출
            const top = container.getAt(2);
            const txt = container.getAt(3);
            txt.setColor('#2D1B18'); // 원래 텍스트 색으로 복귀
            txt.setShadow(0, 0, '#000', 0, false, false); // 광채 제거
            game.scene.scenes[0].tweens.add({ targets: [top, txt], y: 0, duration: 150 }); // 블록이 올라오는 애니메이션
        }

        // 자연스러운 플루트 음색과 리버브가 적용된 사운드 재생 함수
        function playFluteReverb(freq) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const harmonics = [1, 2, 3]; // 플루트의 배음(기본음, 1옥타브, 1.5옥타브 등)
            const gains = [0.1, 0.04, 0.02]; // 각 배음의 크기 배분

            harmonics.forEach((h, i) => {
                const osc = audioCtx.createOscillator(); // 소리 발생기
                const gain = audioCtx.createGain(); // 볼륨 조절기
                osc.type = 'sine'; // 부드러운 사인파 선택
                osc.frequency.setValueAtTime(freq * h, now); // 주파수 설정
                
                // 비브라토(떨림) 구현
                const lfo = audioCtx.createOscillator(); // 저주파 발생기
                const lfoGain = audioCtx.createGain();
                lfo.frequency.setValueAtTime(3, now); // 초당 3번 떨림
                lfoGain.gain.setValueAtTime(freq * 0.004, now); // 떨림의 폭 설정
                lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
                lfo.start();

                // 엠벨로프 설정 (소리의 시작과 끝 조절)
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(gains[i], now + 0.15); // 부드럽게 시작(Attack)
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.5); // 길게 여운 남김(Release)
                
                osc.connect(gain);
                gain.connect(reverbBus); // 생성된 소리를 리버브 통로로 전송
                osc.start();
                osc.stop(now + 1.6); // 1.6초 후 발생기 정지
            });
        }

        function shuffleTiles() { // 블록 위치 셔플 함수
            const { width, height } = this.scale;
            const tileSize = Math.min(width, height) * 0.18;
            let pos = [];
            for (let i = 0; i < 12; i++) {
                let col = i % 3; let row = Math.floor(i / 3);
                pos.push({ x: (width/2) + (col-1)*(tileSize*1.35), y: (height/2) + (row-1.5)*(tileSize*1.35) });
            }
            Phaser.Actions.Shuffle(pos); // 배열 순서 섞기
            tiles.getChildren().forEach((c, i) => {
                game.scene.scenes[0].tweens.add({ targets: c, x: pos[i].x, y: pos[i].y, duration: 800 }); // 부드러운 이동 애니메이션
            });
        }

        // 시작 버튼 이벤트 리스너
        const startBtn = document.getElementById('start-btn');
        startBtn.onclick = function() {
            if (audioCtx) audioCtx.resume(); // 브라우저 오디오 보안 해제
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => { // iOS 센서 권한 요청
                    if (state === 'granted') { initSensor(); startBtn.style.display = 'none'; }
                });
            } else { // 안드로이드 등 일반 환경
                initSensor(); startBtn.style.display = 'none';
            }
        };

        function initSensor() { // 센서 데이터 수신 설정
            window.addEventListener('deviceorientation', (e) => {
                if (baseBeta === null) baseBeta = e.beta; // 최초 기울기 저장(보정용)
                accelX = e.gamma * 25; // 좌우 기울기
                accelY = (e.beta - baseBeta) * 25; // 상하 기울기
            });
        }
    </script>
</body>
</html>
