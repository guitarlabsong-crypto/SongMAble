<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SONG, YOUNG-MIN Guitar Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #261411; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; }
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 18px; cursor: pointer; z-index: 1000;
            background: #5D4037; color: #FFCC80; border: 2px solid #8D6E63; border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 167, 38, 0.3); text-align: center;
        }
    </style>
</head>
<body>
    <button id="start-btn">SONG, YOUNG-MIN Guitar Lab<br>터치하여 연주 시작</button>

    <script>
        let ball, tiles, audioCtx;
        let accelX = 0, accelY = 0, baseBeta = null;

        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];

        const config = {
            type: Phaser.AUTO,
            backgroundColor: '#261411',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: window.innerWidth,
                height: window.innerHeight
            },
            physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
            scene: { create: create, update: update }
        };

        const game = new Phaser.Game(config);

        function create() {
            const width = this.scale.width;
            const height = this.scale.height;
            const centerX = width / 2;
            const centerY = height / 2;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // 1. 텍스처 생성
            createWoodTexture(this);
            createGlassBallTexture(this);
            createLEDTexture(this);

            // 배경
            this.add.tileSprite(centerX, centerY, width, height, 'woodTex').setAlpha(0.2);

            // 3. 입체 블록 생성
            tiles = this.add.group();
            const tileSize = Math.min(width, height) * 0.18;

            for (let i = 0; i < 12; i++) {
                let col = i % 3;
                let row = Math.floor(i / 3);
                let x = centerX + (col - 1) * (tileSize * 1.35);
                let y = centerY + (row - 1.5) * (tileSize * 1.35);

                let container = this.add.container(x, y);

                // LED 불빛 (평소엔 투명)
                let led = this.add.sprite(0, 0, 'ledGlow').setScale(2).setAlpha(0);
                // 그림자 및 측면
                let shadow = this.add.rectangle(5, 5, tileSize, tileSize, 0x000000, 0.4);
                let side = this.add.rectangle(0, 6, tileSize, tileSize, 0x3E2723);
                // 상단 블록
                let top = this.add.sprite(0, 0, 'woodTex').setDisplaySize(tileSize, tileSize).setTint(0x8D6E63);
                let txt = this.add.text(0, 0, notes[i], { 
                    fontSize: (tileSize * 0.3) + 'px', color: '#2D1B18', fontStyle: 'bold' 
                }).setOrigin(0.5);

                container.add([led, shadow, side, top, txt]);
                container.setData({ freq: freqs[i], isOver: false, led: led, top: top, txt: txt });
                
                this.physics.add.existing(container);
                container.body.setSize(tileSize, tileSize);
                tiles.add(container);
            }

            // 4. 구슬
            ball = this.physics.add.sprite(centerX, centerY, 'glassBall');
            ball.setCircle(25).setCollideWorldBounds(true).setBounce(0.5).setDepth(100);

            // 워터마크
            this.add.text(centerX, height - 50, "SONG, YOUNG-MIN Guitar Lab", {
                fontSize: '16px', color: '#FFCC80', alpha: 0.3
            }).setOrigin(0.5);

            window.addEventListener('deviceorientation', (e) => {
                if (baseBeta === null) baseBeta = e.beta;
                accelX = e.gamma * 22; 
                accelY = (e.beta - baseBeta) * 22;
            });

            this.time.addEvent({ delay: 30000, callback: shuffleTiles, callbackScope: this, loop: true });
        }

        // --- 텍스처 생성 함수들 ---
        function createWoodTexture(scene) {
            const woodG = scene.make.graphics({x: 0, y: 0, add: false});
            woodG.fillStyle(0x8D6E63, 1).fillRect(0, 0, 200, 200);
            for(let i=0; i<200; i+=10) {
                woodG.lineStyle(1, 0x4E342E, 0.3);
                woodG.lineBetween(i, 0, i + 5, 200);
            }
            woodG.generateTexture('woodTex', 200, 200);
        }

        function createLEDTexture(scene) {
            const ledG = scene.make.graphics({x: 0, y: 0, add: false});
            // 노란색에서 투명으로 퍼지는 그라디언트 느낌
            for(let r = 50; r > 0; r--) {
                ledG.fillStyle(0xFFA726, (50 - r) / 500);
                ledG.fillCircle(50, 50, r);
            }
            ledG.generateTexture('ledGlow', 100, 100);
        }

        function createGlassBallTexture(scene) {
            const g = scene.make.graphics({x: 0, y: 0, add: false});
            g.lineStyle(2, 0xffffff, 0.6).strokeCircle(25, 25, 23);
            g.fillStyle(0xffffff, 0.1).fillCircle(25, 25, 23);
            g.fillStyle(0xffffff, 0.6).fillCircle(18, 18, 8);
            g.generateTexture('glassBall', 50, 50);
        }

        function shuffleTiles() {
            const centerX = this.scale.width / 2;
            const centerY = this.scale.height / 2;
            const tileSize = Math.min(this.scale.width, this.scale.height) * 0.18;
            let pos = [];
            for (let i = 0; i < 12; i++) {
                let col = i % 3; let row = Math.floor(i / 3);
                pos.push({ x: centerX + (col - 1) * (tileSize * 1.35), y: centerY + (row - 1.5) * (tileSize * 1.35) });
            }
            Phaser.Actions.Shuffle(pos);
            tiles.getChildren().forEach((c, i) => {
                this.tweens.add({ targets: c, x: pos[i].x, y: pos[i].y, duration: 1000, ease: 'Cubic.easeInOut' });
            });
        }

        function update() {
            if (ball) {
                ball.setVelocityX(accelX);
                ball.setVelocityY(accelY);

                tiles.getChildren().forEach(container => {
                    const dist = Phaser.Math.Distance.Between(ball.x, ball.y, container.x, container.y);
                    if (dist < 45) {
                        if (!container.getData('isOver')) {
                            container.setData('isOver', true);
                            activateBlock.call(this, container);
                        }
                    } else if (container.getData('isOver') && dist > 55) {
                        container.setData('isOver', false);
                        deactivateBlock.call(this, container);
                    }
                });
            }
        }

        function activateBlock(container) {
            const led = container.getData('led');
            const top = container.getData('top');
            const txt = container.getData('txt');

            playFluteNote(container.getData('freq'));

            this.tweens.add({ targets: led, alpha: 0.8, scale: 2.5, duration: 200 });
            this.tweens.add({ targets: [top, txt], y: 5, duration: 100 });
            top.setTint(0xFFCC80); // 밟았을 때 나무가 밝게 빛남
        }

        function deactivateBlock(container) {
            const led = container.getData('led');
            const top = container.getData('top');
            const txt = container.getData('txt');

            this.tweens.add({ targets: led, alpha: 0, scale: 2, duration: 500 });
            this.tweens.add({ targets: [top, txt], y: 0, duration: 200 });
            top.setTint(0x8D6E63);
        }

        // --- 플루트 음색 합성 함수 ---
        function playFluteNote(freq) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            // 기본파 + 배음 (플루트의 맑은 소리 구현)
            const oscs = [1, 2, 3]; // 기본 주파수와 옥타브 배음들
            const gains = [0.15, 0.05, 0.02]; // 배음의 세기

            oscs.forEach((mul, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = (i === 0) ? 'sine' : 'sine'; // 부드러운 사인파 기반
                osc.frequency.setValueAtTime(freq * mul, now);
                
                // 비브라토 추가 (플루트의 떨림)
                const vibrato = audioCtx.createOscillator();
                const vibratoGain = audioCtx.createGain();
                vibrato.frequency.setValueAtTime(5, now); // 5Hz 떨림
                vibratoGain.gain.setValueAtTime(freq * 0.005, now);
                vibrato.connect(vibratoGain);
                vibratoGain.connect(osc.frequency);
                vibrato.start();

                // 엔벨로프 (부드러운 시작과 끝)
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(gains[i], now + 0.1); // Attack
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2); // Release
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(now + 1.3);
            });
        }

        document.getElementById('start-btn').onclick = function() {
            baseBeta = null;
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') {
                        audioCtx.resume();
                        this.style.display = 'none';
                    }
                });
            } else {
                audioCtx.resume();
                this.style.display = 'none';
            }
        };
    </script>
</body>
</html>
