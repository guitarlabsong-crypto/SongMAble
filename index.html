<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SONG, YOUNG-MIN Guitar Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        /* 배경이 검게 변하는 것을 방지하기 위해 기본 색상 지정 */
        body { margin: 0; overflow: hidden; background-color: #3E2723; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; }
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 18px; cursor: pointer; z-index: 1000;
            background: #8D6E63; color: #ffffff; border: 2px solid #5D4037; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
        }
    </style>
</head>
<body>
    <button id="start-btn">SONG, YOUNG-MIN Guitar Lab<br>터치하여 시작</button>

    <script>
        let ball, tiles, audioCtx;
        let accelX = 0, accelY = 0, baseBeta = null;

        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];

        const config = {
            type: Phaser.AUTO,
            backgroundColor: '#3E2723', // 엔진 시작 전 기본 배경색
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: window.innerWidth,
                height: window.innerHeight
            },
            physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
            scene: { create: create, update: update }
        };

        const game = new Phaser.Game(config);

        function create() {
            const width = this.scale.width;
            const height = this.scale.height;
            const centerX = width / 2;
            const centerY = height / 2;
            
            // 오디오 컨텍스트 초기화 (터치 전까지 정지 상태)
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // 1. 텍스처 생성 (나무 및 구슬)
            const woodG = this.make.graphics({x: 0, y: 0, add: false});
            woodG.fillStyle(0x8D6E63, 1).fillRect(0, 0, 200, 200);
            for(let i=0; i<200; i+=10) {
                woodG.lineStyle(1, 0x5D4037, 0.3);
                woodG.lineBetween(i, 0, i + (Math.random()*10), 200);
            }
            woodG.generateTexture('woodTex', 200, 200);

            const glassG = this.make.graphics({x: 0, y: 0, add: false});
            glassG.lineStyle(2, 0xffffff, 0.6).strokeCircle(25, 25, 23);
            glassG.fillStyle(0xffffff, 0.2).fillCircle(25, 25, 23);
            glassG.fillStyle(0xffffff, 0.6).fillCircle(18, 18, 8);
            glassG.generateTexture('glassBall', 50, 50);

            // 2. 배경 바닥 깔기
            this.add.tileSprite(centerX, centerY, width, height, 'woodTex').setAlpha(0.4);

            // 3. 입체 블록 생성
            tiles = this.add.group();
            const tileSize = Math.min(width, height) * 0.18;

            for (let i = 0; i < 12; i++) {
                let col = i % 3;
                let row = Math.floor(i / 3);
                let x = centerX + (col - 1) * (tileSize * 1.3);
                let y = centerY + (row - 1.5) * (tileSize * 1.3);

                let container = this.add.container(x, y);
                let shadow = this.add.rectangle(5, 5, tileSize, tileSize, 0x000000, 0.4);
                let side = this.add.rectangle(0, 6, tileSize, tileSize, 0x4E342E);
                let top = this.add.sprite(0, 0, 'woodTex').setDisplaySize(tileSize, tileSize);
                let txt = this.add.text(0, 0, notes[i], { 
                    fontSize: (tileSize * 0.3) + 'px', color: '#2D1B18', fontStyle: 'bold' 
                }).setOrigin(0.5);

                container.add([shadow, side, top, txt]);
                container.setData({ freq: freqs[i], isOver: false, top: top, txt: txt, shadow: shadow });
                
                this.physics.add.existing(container);
                container.body.setSize(tileSize, tileSize);
                tiles.add(container);
            }

            // 4. 구슬 생성 및 중앙 배치
            ball = this.physics.add.sprite(centerX, centerY, 'glassBall');
            ball.setCircle(25).setCollideWorldBounds(true).setBounce(0.5).setDepth(100);

            // 5. 워터마크
            this.add.text(centerX, height - 50, "SONG, YOUNG-MIN Guitar Lab", {
                fontSize: '16px', color: '#ffffff', alpha: 0.5
            }).setOrigin(0.5);

            // 30초 셔플
            this.time.addEvent({ delay: 30000, callback: shuffleTiles, callbackScope: this, loop: true });
        }

        function shuffleTiles() {
            const centerX = this.scale.width / 2;
            const centerY = this.scale.height / 2;
            const tileSize = Math.min(this.scale.width, this.scale.height) * 0.18;
            let pos = [];
            for (let i = 0; i < 12; i++) {
                let col = i % 3; let row = Math.floor(i / 3);
                pos.push({ x: centerX + (col - 1) * (tileSize * 1.3), y: centerY + (row - 1.5) * (tileSize * 1.3) });
            }
            Phaser.Actions.Shuffle(pos);
            tiles.getChildren().forEach((c, i) => {
                this.tweens.add({ targets: c, x: pos[i].x, y: pos[i].y, duration: 800, ease: 'Power2' });
            });
        }

        function update() {
            if (ball) {
                ball.setVelocityX(accelX * 1.5);
                ball.setVelocityY(accelY * 1.5);

                tiles.getChildren().forEach(container => {
                    const distance = Phaser.Math.Distance.Between(ball.x, ball.y, container.x, container.y);
                    // 구슬 반지름(25) + 블록 절반 크기 고려하여 타이트하게 체크
                    if (distance < 50) {
                        if (!container.getData('isOver')) {
                            container.setData('isOver', true);
                            pressButton.call(this, container);
                        }
                    } else {
                        container.setData('isOver', false);
                    }
                });
            }
        }

        function pressButton(container) {
            const top = container.getAt(2);
            const txt = container.getAt(3);
            playNote(container.getData('freq'));
            this.tweens.add({
                targets: [top, txt], y: 5, duration: 80, yoyo: true
            });
        }

        function playNote(freq) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
        }

        // --- 센서 및 권한 처리 ---
        const startBtn = document.getElementById('start-btn');
        startBtn.onclick = function() {
            // 1. 오디오 컨텍스트 재개
            if (audioCtx) audioCtx.resume();

            // 2. 센서 권한 요청 (iOS 대응)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            initSensor();
                            startBtn.style.display = 'none';
                        } else {
                            alert('센서 권한이 거부되었습니다. 설정에서 허용해주세요.');
                        }
                    })
                    .catch(console.error);
            } else {
                // 안드로이드 및 일반 환경
                initSensor();
                startBtn.style.display = 'none';
            }
        };

        function initSensor() {
            window.addEventListener('deviceorientation', (e) => {
                if (baseBeta === null) baseBeta = e.beta;
                accelX = e.gamma * 20; 
                accelY = (e.beta - baseBeta) * 20;
            });
        }
    </script>
</body>
</html>
