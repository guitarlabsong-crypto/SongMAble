<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SONG,YOUNG-MIN Guitar Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #3E2723; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; }
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 22px 45px; font-size: 18px; cursor: pointer; z-index: 1000;
            background: #8D6E63; color: #ffffff; border: 2px solid #5D4037; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
        }
    </style>
</head>
<body>
    <button id="start-btn">SONG,YOUNG-MIN Guitar Lab<br>터치하여 play시작</button>

    <script>
        let ball, tiles, audioCtx, reverbBus;
        let accelX = 0, accelY = 0, baseBeta = null;

        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];

        const config = {
            type: Phaser.AUTO,
            backgroundColor: '#3E2723',
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: window.innerWidth, height: window.innerHeight },
            physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
            scene: { create: create, update: update }
        };

        const game = new Phaser.Game(config);

        function create() {
            const { width, height } = this.scale;
            const centerX = width / 2;
            const centerY = height / 2;

            setupAudio();

            // 1. 나무 텍스처 생성
            const woodG = this.make.graphics({x: 0, y: 0, add: false});
            woodG.fillStyle(0x8D6E63, 1).fillRect(0, 0, 200, 200);
            for(let i=0; i<200; i+=10) {
                woodG.lineStyle(1, 0x5D4037, 0.3);
                woodG.lineBetween(i, 0, i + (Math.random()*15), 200);
            }
            woodG.generateTexture('woodTex', 200, 200);

            this.add.tileSprite(centerX, centerY, width, height, 'woodTex').setAlpha(0.35);

            // 2. 입체 블록 생성
            tiles = this.add.group();
            const tileSize = Math.min(width, height) * 0.18;

            for (let i = 0; i < 12; i++) {
                let col = i % 3; let row = Math.floor(i / 3);
                let x = centerX + (col - 1) * (tileSize * 1.35);
                let y = centerY + (row - 1.5) * (tileSize * 1.35);

                let container = this.add.container(x, y);
                let shadow = this.add.rectangle(5, 5, tileSize, tileSize, 0x000000, 0.4);
                let side = this.add.rectangle(0, 6, tileSize, tileSize, 0x4E342E);
                let top = this.add.sprite(0, 0, 'woodTex').setDisplaySize(tileSize, tileSize);
                let txt = this.add.text(0, 0, notes[i], { fontSize: (tileSize * 0.32) + 'px', color: '#2D1B18', fontStyle: 'bold' }).setOrigin(0.5);

                container.add([shadow, side, top, txt]);
                container.setData({ freq: freqs[i], isOver: false, top, txt });
                this.physics.add.existing(container);
                container.body.setSize(tileSize, tileSize);
                tiles.add(container);
            }

            // 3. 1.5배 커진 유리 구슬
            const glassG = this.make.graphics({x: 0, y: 0, add: false});
            glassG.lineStyle(3, 0xffffff, 0.6).strokeCircle(38, 38, 35);
            glassG.fillStyle(0xffffff, 0.15).fillCircle(38, 38, 35);
            glassG.fillStyle(0xffffff, 0.6).fillCircle(25, 25, 12);
            glassG.generateTexture('glassBallLarge', 76, 76);

            ball = this.physics.add.sprite(centerX, centerY, 'glassBallLarge');
            ball.setCircle(38).setCollideWorldBounds(true).setBounce(0.5).setDepth(100);

            // 4. 워터마크 업데이트 (두 줄 구성)
            // 메인 브랜드명
            this.add.text(centerX, height - 80, "SONG,YOUNG-MIN Guitar Lab", {
                fontSize: '18px', color: '#ffffff', alpha: 0.6, fontStyle: 'bold'
            }).setOrigin(0.5);
            
            // 서브 브랜드명 추가 (Jamsil Flute Artlounge)
            this.add.text(centerX, height - 60, "Jamsil Flute Artlounge", {
                fontSize: '18px', color: '#FF9800', alpha: 0.7, fontStyle: 'italic'
            }).setOrigin(0.5);

            this.time.addEvent({ delay: 30000, callback: shuffleTiles, callbackScope: this, loop: true });
        }

        function setupAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            reverbBus = audioCtx.createGain();
            const delay = audioCtx.createDelay();
            const feedback = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            delay.delayTime.value = 0.18; // 잔향 시간 약간 증가 (공간감 강화)
            feedback.gain.value = 0.45;    // 잔향 피드백 증가
            filter.frequency.value = 2200; 

            reverbBus.connect(delay);
            delay.connect(feedback);
            feedback.connect(filter);
            filter.connect(delay);
            filter.connect(audioCtx.destination);
            reverbBus.connect(audioCtx.destination);
        }

        function update() {
            if (ball) {
                ball.setVelocityX(accelX * 1.8);
                ball.setVelocityY(accelY * 1.8);

                tiles.getChildren().forEach(container => {
                    const distance = Phaser.Math.Distance.Between(ball.x, ball.y, container.x, container.y);
                    if (distance < 65) { 
                        if (!container.getData('isOver')) {
                            container.setData('isOver', true);
                            activateBlock(container);
                        }
                    } else {
                        if (container.getData('isOver')) {
                            container.setData('isOver', false);
                            deactivateBlock(container);
                        }
                    }
                });
            }
        }

        function activateBlock(container) {
            const top = container.getAt(2);
            const txt = container.getAt(3);
            playFluteReverb(container.getData('freq'));
            txt.setColor('#FFF9C4');
            txt.setShadow(0, 0, '#FFD54F', 15, true, true);
            game.scene.scenes[0].tweens.add({ targets: [top, txt], y: 6, duration: 80 });
        }

        function deactivateBlock(container) {
            const top = container.getAt(2);
            const txt = container.getAt(3);
            txt.setColor('#2D1B18');
            txt.setShadow(0, 0, '#000', 0, false, false);
            game.scene.scenes[0].tweens.add({ targets: [top, txt], y: 0, duration: 150 });
        }

        function playFluteReverb(freq) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const harmonics = [1, 2, 3];
            const gains = [0.1, 0.04, 0.02];

            harmonics.forEach((h, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq * h, now);
                
                const lfo = audioCtx.createOscillator();
                const lfoGain = audioCtx.createGain();
                lfo.frequency.setValueAtTime(4.8, now); // 비브라토 속도 미세 조정
                lfoGain.gain.setValueAtTime(freq * 0.005, now);
                lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
                lfo.start();

                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(gains[i], now + 0.12);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.8); // 여운을 조금 더 길게
                
                osc.connect(gain);
                gain.connect(reverbBus);
                osc.start();
                osc.stop(now + 2.0);
            });
        }

        function shuffleTiles() {
            const { width, height } = this.scale;
            const tileSize = Math.min(width, height) * 0.18;
            let pos = [];
            for (let i = 0; i < 12; i++) {
                let col = i % 3; let row = Math.floor(i / 3);
                pos.push({ x: (width/2) + (col-1)*(tileSize*1.35), y: (height/2) + (row-1.5)*(tileSize*1.35) });
            }
            Phaser.Actions.Shuffle(pos);
            tiles.getChildren().forEach((c, i) => {
                game.scene.scenes[0].tweens.add({ targets: c, x: pos[i].x, y: pos[i].y, duration: 800 });
            });
        }

        const startBtn = document.getElementById('start-btn');
        startBtn.onclick = function() {
            if (audioCtx) audioCtx.resume();
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') { initSensor(); startBtn.style.display = 'none'; }
                });
            } else { initSensor(); startBtn.style.display = 'none'; }
        };

        function initSensor() {
            window.addEventListener('deviceorientation', (e) => {
                if (baseBeta === null) baseBeta = e.beta;
                accelX = e.gamma * 25; 
                accelY = (e.beta - baseBeta) * 25;
            });
        }
    </script>
</body>
</html>
