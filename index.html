<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SONG, YOUNG-MIN Guitar Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #3E2723; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; }
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 18px; cursor: pointer; z-index: 1000;
            background: #FF9800; color: #ffffff; border: none; border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; font-weight: bold;
        }
    </style>
</head>
<body>
    <button id="start-btn">SONG, YOUNG-MIN Guitar Lab<br>터치하여 시작</button>

    <script>
        let ball, waterGraphics, ballGlow, tiles, audioCtx;
        let accelX = 0, accelY = 0, baseBeta = null;

        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];

        const config = {
            type: Phaser.AUTO,
            backgroundColor: '#3E2723',
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: window.innerWidth, height: window.innerHeight },
            physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
            scene: { create: create, update: update }
        };

        const game = new Phaser.Game(config);

        function create() {
            const { width, height } = this.scale;
            const centerX = width / 2;
            const centerY = height / 2;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // 1. 나무 질감 텍스처 생성
            const woodG = this.make.graphics({x: 0, y: 0, add: false});
            woodG.fillStyle(0x8D6E63, 1).fillRect(0, 0, 200, 200);
            for(let i=0; i<200; i+=10) {
                woodG.lineStyle(1, 0x5D4037, 0.3);
                woodG.lineBetween(i, 0, i + (Math.random()*15), 200);
            }
            woodG.generateTexture('woodTex', 200, 200);

            // 배경
            this.add.tileSprite(centerX, centerY, width, height, 'woodTex').setAlpha(0.3);

            // 2. 워터마크 (오렌지 컬러)
            this.add.text(centerX, 50, "SONG, YOUNG-MIN Guitar Lab", {
                fontSize: '22px', color: '#FF9800', fontStyle: 'bold', alpha: 0.9
            }).setOrigin(0.5);

            // 3. 입체 블록 생성
            tiles = this.add.group();
            const tileSize = Math.min(width, height) * 0.18;

            for (let i = 0; i < 12; i++) {
                let col = i % 3; let row = Math.floor(i / 3);
                let x = centerX + (col - 1) * (tileSize * 1.35);
                let y = centerY + (row - 1.5) * (tileSize * 1.35);

                let container = this.add.container(x, y);
                let shadow = this.add.rectangle(5, 5, tileSize, tileSize, 0x000000, 0.4);
                let side = this.add.rectangle(0, 6, tileSize, tileSize, 0x4E342E);
                let top = this.add.sprite(0, 0, 'woodTex').setDisplaySize(tileSize, tileSize);
                let txt = this.add.text(0, 0, notes[i], { fontSize: (tileSize * 0.3) + 'px', color: '#2D1B18', fontStyle: 'bold' }).setOrigin(0.5);

                container.add([shadow, side, top, txt]);
                container.setData({ freq: freqs[i], isOver: false, top, txt });
                this.physics.add.existing(container);
                container.body.setSize(tileSize, tileSize);
                tiles.add(container);
            }

            // 4. 구슬 그래픽 및 물리
            waterGraphics = this.add.graphics().setDepth(101);
            ballGlow = this.add.graphics().setDepth(102);

            ball = this.physics.add.sprite(centerX, centerY, null);
            ball.setCircle(25).setCollideWorldBounds(true).setBounce(0.5).setVisible(false);

            this.time.addEvent({ delay: 30000, callback: shuffleTiles, callbackScope: this, loop: true });
        }

        function update() {
            if (ball) {
                ball.setVelocityX(accelX * 1.8);
                ball.setVelocityY(accelY * 1.8);

                // 구슬 내부 물 드로잉 (동기화 보정)
                drawSyncWater(ball.x, ball.y);

                tiles.getChildren().forEach(container => {
                    const distance = Phaser.Math.Distance.Between(ball.x, ball.y, container.x, container.y);
                    if (distance < 48) {
                        if (!container.getData('isOver')) {
                            container.setData('isOver', true);
                            pressButton.call(this, container);
                        }
                    } else {
                        container.setData('isOver', false);
                    }
                });
            }
        }

        function drawSyncWater(x, y) {
            waterGraphics.clear();
            ballGlow.clear();

            // 1. 유리 외곽 및 내부 기본광
            waterGraphics.lineStyle(2, 0xffffff, 0.5);
            waterGraphics.strokeCircle(x, y, 25);
            waterGraphics.fillStyle(0xffffff, 0.05);
            waterGraphics.fillCircle(x, y, 25);

            // 2. 물의 각도 계산 (accelX, accelY의 방향을 반전시켜 중력 방향과 일치시킴)
            // 구슬이 내려가는 방향(가속도 방향)으로 물이 쏠리도록 보정
            let targetAngle = Math.atan2(accelY, accelX);
            
            waterGraphics.fillStyle(0x0288D1, 0.6); // 물 색상
            waterGraphics.beginPath();
            // 물이 아래쪽에 고이도록 반원을 그림
            waterGraphics.arc(x, y, 24, targetAngle, targetAngle + Math.PI, false);
            waterGraphics.closePath();
            waterGraphics.fillPath();

            // 3. 유리구슬 상단 반사광 (항상 위쪽에 위치하여 고정된 느낌 부여)
            ballGlow.fillStyle(0xffffff, 0.4);
            ballGlow.fillCircle(x - 7, y - 7, 5);
        }

        function shuffleTiles() {
            const { width, height } = this.scale;
            const tileSize = Math.min(width, height) * 0.18;
            let pos = [];
            for (let i = 0; i < 12; i++) {
                let col = i % 3; let row = Math.floor(i / 3);
                pos.push({ x: (width/2) + (col-1)*(tileSize*1.35), y: (height/2) + (row-1.5)*(tileSize*1.35) });
            }
            Phaser.Actions.Shuffle(pos);
            tiles.getChildren().forEach((c, i) => {
                this.tweens.add({ targets: c, x: pos[i].x, y: pos[i].y, duration: 800, ease: 'Power2' });
            });
        }

        function pressButton(container) {
            const top = container.getData('top');
            const txt = container.getData('txt');
            playNote(container.getData('freq'));
            this.tweens.add({ targets: [top, txt], y: 5, duration: 80, yoyo: true });
        }

        function playNote(freq) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.6);
        }

        const startBtn = document.getElementById('start-btn');
        startBtn.onclick = function() {
            if (audioCtx) audioCtx.resume();
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') { initSensor(); startBtn.style.display = 'none'; }
                });
            } else { initSensor(); startBtn.style.display = 'none'; }
        };

        function initSensor() {
            window.addEventListener('deviceorientation', (e) => {
                if (baseBeta === null) baseBeta = e.beta;
                // 감도를 높여 물이 더 빠르게 반응하도록 설정
                accelX = e.gamma * 25; 
                accelY = (e.beta - baseBeta) * 25;
            });
        }
    </script>
</body>
</html>
