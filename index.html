<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gyro Sound Sphere</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #5D4037; }
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 20px; cursor: pointer; z-index: 100;
            background: #FF9800; color: white; border: none; border-radius: 10px;
        }
    </style>
</head>
<body>
    <button id="start-btn">게임 시작 및 센서 허용</button>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 0 }, debug: false }
            },
            scene: { create: create, update: update }
        };

        let ball, tiles, graphics;
        let accelX = 0, accelY = 0;
        const game = new Phaser.Game(config);

        function create() {
            const centerX = this.cameras.main.centerX;
            const centerY = this.cameras.main.centerY;

            // 1. 배경 타일 (12음계)
            tiles = this.physics.add.staticGroup();
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            const tileSize = 70;
            
            for (let i = 0; i < 12; i++) {
                let col = i % 3;
                let row = Math.floor(i / 3);
                let x = centerX + (col - 1) * (tileSize + 15);
                let y = centerY + (row - 1.5) * (tileSize + 15);

                let tile = this.add.rectangle(x, y, tileSize, tileSize, 0x795548).setStrokeStyle(2, 0x3E2723);
                tile.setData('index', i);
                tiles.add(tile);
                this.add.text(x, y, notes[i], { fontSize: '14px', color: '#D7CCC8' }).setOrigin(0.5);
            }

            // 2. 쇠구슬 생성 (그래픽으로 직접 그리기)
            // 'ball'이라는 이름의 그래픽 객체를 물리 엔진에 등록합니다.
            const ballGraphics = this.add.graphics();
            ballGraphics.fillStyle(0xE0E0E0, 1); // 밝은 회색(쇠 느낌)
            ballGraphics.fillCircle(15, 15, 15);
            ballGraphics.generateTexture('ballTexture', 30, 30);
            ballGraphics.destroy();

            ball = this.physics.add.sprite(centerX, centerY, 'ballTexture');
            ball.setCircle(15);
            ball.setCollideWorldBounds(true);
            ball.setBounce(0.6);

            // 3. 워터마크 (우측 하단)
            this.add.text(window.innerWidth - 20, window.innerHeight - 20, "SONG LAB", {
                fontSize: '20px', color: '#ffffff', alpha: 0.2
            }).setOrigin(1);

            // 4. 충돌 설정 및 소리 (콘솔 로그로 확인)
            this.physics.add.overlap(ball, tiles, (b, tile) => {
                if (!tile.getData('playing')) {
                    tile.setData('playing', true);
                    tile.setFillStyle(0xFFA726); 
                    console.log(`Play Note: ${tile.getData('index')}`);
                    
                    this.time.delayedCall(300, () => {
                        tile.setFillStyle(0x795548);
                        tile.setData('playing', false);
                    });
                }
            });

            // 5. 센서 이벤트
            window.addEventListener('deviceorientation', (e) => {
                // 스마트폰 기울기에 따라 속도 조절
                accelX = e.gamma * 20; 
                accelY = e.beta * 20;
            });
        }

        function update() {
            if (ball) {
                ball.setVelocityX(accelX);
                ball.setVelocityY(accelY);
            }
        }

        // 권한 요청 버튼
        document.getElementById('start-btn').onclick = function() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') this.style.display = 'none';
                });
            } else {
                this.style.display = 'none';
            }
        };
    </script>
</body>
</html>
