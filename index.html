<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SONG, YOUNG-MIN Guitar Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        /* 나무 바닥 느낌의 배경색 */
        body { margin: 0; overflow: hidden; background-color: #3E2723; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; }
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 18px; cursor: pointer; z-index: 100;
            background: #5D4037; color: #D7CCC8; border: 2px solid #8D6E63; border-radius: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <button id="start-btn">SONG, YOUNG-MIN Guitar Lab</button>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 0 }, debug: false }
            },
            scene: { create: create, update: update }
        };

        let ball, tiles, audioCtx;
        let accelX = 0, accelY = 0;
        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];

        const game = new Phaser.Game(config);

        function create() {
            const centerX = this.cameras.main.centerX;
            const centerY = this.cameras.main.centerY;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // 1. 나무 바닥 배경 (단순하고 명확한 드로잉)
            const bg = this.add.graphics();
            bg.fillStyle(0x4E342E, 1);
            bg.fillRect(0, 0, config.width, config.height);
            bg.lineStyle(1, 0x3E2723, 0.5);
            for(let i=0; i<config.width; i+=40) { bg.lineBetween(i, 0, i, config.height); }

            // 2. 투명 유리구슬 테두리 및 광택 생성
            const glassCanvas = this.make.graphics({x: 0, y: 0, add: false});
            glassCanvas.lineStyle(2, 0xffffff, 0.8); // 외곽선
            glassCanvas.strokeCircle(25, 25, 24);
            glassCanvas.fillStyle(0xffffff, 0.2); // 내부 투명도
            glassCanvas.fillCircle(25, 25, 24);
            glassCanvas.fillStyle(0xffffff, 0.6); // 상단 반사광
            glassCanvas.fillCircle(18, 18, 8);
            glassCanvas.generateTexture('glassBall', 50, 50);

            // 3. 나무 블럭 버튼 배치
            tiles = this.physics.add.staticGroup();
            const tileSize = 80;
            for (let i = 0; i < 12; i++) {
                let col = i % 3;
                let row = Math.floor(i / 3);
                let x = centerX + (col - 1) * (tileSize + 30);
                let y = centerY + (row - 1.5) * (tileSize + 30);

                // 나무 질감의 사각형
                let block = this.add.rectangle(x, y, tileSize, tileSize, 0x8D6E63).setStrokeStyle(3, 0x5D4037);
                let txt = this.add.text(x, y, notes[i], { 
                    fontSize: '22px', color: '#3E2723', fontStyle: 'bold', fontFamily: '맑은 고딕' 
                }).setOrigin(0.5);

                block.setData({ freq: freqs[i], active: false, text: txt });
                tiles.add(block);
            }

            // 4. 유리구슬 생성 (첫 코드의 물리 방식)
            ball = this.physics.add.sprite(centerX, centerY, 'glassBall');
            ball.setCircle(25);
            ball.setCollideWorldBounds(true);
            ball.setBounce(0.5);
            ball.setDepth(10);

            // 5. 워터마크 (하단 정중앙 배치)
            this.add.text(centerX, window.innerHeight - 40, "SONG, YOUNG-MIN Guitar Lab", {
                fontSize: '18px', color: '#ffffff', alpha: 0.5, fontFamily: '맑은 고딕'
            }).setOrigin(0.5);

            // 30초 셔플 타이머
            this.time.addEvent({ delay: 30000, callback: shuffleTiles, callbackScope: this, loop: true });

            // 자이로 센서 수신
            window.addEventListener('deviceorientation', (e) => {
                // 초기 코드처럼 직관적인 속도 변환 (gamma: 좌우, beta: 상하)
                accelX = e.gamma * 15; 
                accelY = (e.beta - 45) * 15; 
            });
        }

        function shuffleTiles() {
            const centerX = this.cameras.main.centerX;
            const centerY = this.cameras.main.centerY;
            const tileSize = 80;
            let pos = [];
            for (let i = 0; i < 12; i++) {
                let col = i % 3;
                let row = Math.floor(i / 3);
                pos.push({ x: centerX + (col - 1) * (tileSize + 30), y: centerY + (row - 1.5) * (tileSize + 30) });
            }
            Phaser.Actions.Shuffle(pos);

            tiles.getChildren().forEach((tile, index) => {
                const txt = tile.getData('text');
                this.tweens.add({
                    targets: [tile, txt],
                    x: pos[index].x, y: pos[index].y,
                    duration: 1000, ease: 'Expo.easeInOut'
                });
            });
        }

        function update() {
            if (ball) {
                // 초기 방식: 가속도가 아닌 속도를 즉각 대입하여 빠릿한 움직임 구현
                ball.setVelocityX(accelX * 2); 
                ball.setVelocityY(accelY * 2);

                // 구슬이 타일 위에 있는지 체크 (Overlap)
                this.physics.overlap(ball, tiles, (b, tile) => {
                    if (!tile.getData('active')) {
                        tile.setData('active', true);
                        
                        // 버튼 눌림 시각 효과
                        this.tweens.add({
                            targets: [tile, tile.getData('text')],
                            scale: 0.9, y: '+=5', duration: 100, yoyo: true,
                            onStart: () => playNote(tile.getData('freq')),
                            onComplete: () => tile.setData('active', false)
                        });
                    }
                });
            }
        }

        function playNote(freq) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.7);
        }

        document.getElementById('start-btn').onclick = function() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') {
                        audioCtx.resume();
                        this.style.display = 'none';
                    }
                });
            } else {
                audioCtx.resume();
                this.style.display = 'none';
            }
        };
    </script>
</body>
</html>
