<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SONG, YOUNG-MIN Guitar Lab - Aleatoric Music</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #3E2723; font-family: 'Malgun Gothic', sans-serif; }
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 18px; cursor: pointer; z-index: 100;
            background: #D84315; color: white; border: none; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <button id="start-btn">예술적 우연성 시작</button>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
            scene: { create: create, update: update }
        };

        let ball, tiles, audioCtx;
        let accelX = 0, accelY = 0;
        const game = new Phaser.Game(config);

        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];

        function create() {
            const centerX = this.cameras.main.centerX;
            const centerY = this.cameras.main.centerY;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // 1. 리얼한 은색 쇠구슬 텍스처 생성
            const graphics = this.add.graphics();
            graphics.fillGradientStyle(0xffffff, 0x9e9e9e, 0x9e9e9e, 0x616161, 1);
            graphics.fillCircle(20, 20, 20);
            graphics.lineStyle(1, 0xffffff, 0.8);
            graphics.strokeCircle(20, 20, 20);
            graphics.generateTexture('silverBall', 40, 40);
            graphics.destroy();

            // 2. 음계 타일 그룹 생성
            tiles = this.add.group();
            createTiles.call(this);

            // 3. 쇠구슬 배치
            ball = this.physics.add.sprite(centerX, centerY, 'silverBall');
            ball.setCircle(20);
            ball.setCollideWorldBounds(true);
            ball.setBounce(0.4);
            ball.setDrag(120);
            ball.setDamping(true);

            // 4. 워터마크 (맑은 고딕)
            this.add.text(window.innerWidth - 20, window.innerHeight - 25, "SONG, YOUNG-MIN Guitar Lab", {
                fontSize: '15px', color: '#ffffff', alpha: 0.5, fontFamily: '"Malgun Gothic", "맑은 고딕", sans-serif'
            }).setOrigin(1);

            // 5. 30초마다 랜덤 재배치 타이머
            this.time.addEvent({
                delay: 30000,
                callback: shuffleTiles,
                callbackScope: this,
                loop: true
            });

            // 자이로 센서 수신
            window.addEventListener('deviceorientation', (e) => {
                accelX = e.gamma * 40; // 가속도 상향
                accelY = e.beta * 40;
            });
        }

        function createTiles() {
            const centerX = this.cameras.main.centerX;
            const centerY = this.cameras.main.centerY;
            const tileSize = 75;

            for (let i = 0; i < 12; i++) {
                let col = i % 3;
                let row = Math.floor(i / 3);
                let x = centerX + (col - 1) * (tileSize + 25);
                let y = centerY + (row - 1.5) * (tileSize + 25);

                // 버튼 형태 (베이스)
                let base = this.add.rectangle(x, y, tileSize, tileSize, 0x212121).setStrokeStyle(4, 0x000000);
                // 실제 눌리는 상단부
                let top = this.add.rectangle(x, y, tileSize-4, tileSize-4, 0x5D4037).setInteractive();
                let txt = this.add.text(x, y, notes[i], { fontSize: '18px', color: '#BDBDBD' }).setOrigin(0.5);

                top.setData({ freq: freqs[i], note: notes[i], active: false });
                tiles.add(top);
                tiles.add(txt);
            }
        }

        function shuffleTiles() {
            const centerX = this.cameras.main.centerX;
            const centerY = this.cameras.main.centerY;
            const tileSize = 75;
            
            // 위치 좌표 리스트 생성
            let positions = [];
            for (let i = 0; i < 12; i++) {
                let col = i % 3;
                let row = Math.floor(i / 3);
                positions.push({
                    x: centerX + (col - 1) * (tileSize + 25),
                    y: centerY + (row - 1.5) * (tileSize + 25)
                });
            }
            Phaser.Actions.Shuffle(positions);

            // 타일과 텍스트 이동
            let topTiles = tiles.getChildren().filter(c => c instanceof Phaser.GameObjects.Rectangle);
            let texts = tiles.getChildren().filter(c => c instanceof Phaser.GameObjects.Text);

            topTiles.forEach((tile, index) => {
                this.tweens.add({
                    targets: [tile, texts[index]],
                    x: positions[index].x,
                    y: positions[index].y,
                    duration: 800,
                    ease: 'Power2'
                });
            });

            // 셔플 알림 안내
            let notice = this.add.text(centerX, 50, "Aleatoric Shuffle!", { fontSize: '24px', color: '#FFAB91' }).setOrigin(0.5);
            this.time.delayedCall(2000, () => notice.destroy());
        }

        function update() {
            if (ball) {
                ball.setAccelerationX(accelX);
                ball.setAccelerationY(accelY);

                // 버튼 눌림 판정 (Overlap 시 애니메이션)
                tiles.getChildren().forEach(tile => {
                    if (tile instanceof Phaser.GameObjects.Rectangle) {
                        let bounds = tile.getBounds();
                        if (Phaser.Geom.Intersects.RectangleToRectangle(ball.getBounds(), bounds)) {
                            if (!tile.getData('active')) {
                                tile.setData('active', true);
                                pressButton.call(this, tile);
                            }
                        }
                    }
                });
            }
        }

        function pressButton(tile) {
            // 버튼이 눌리는 시각 효과
            this.tweens.add({
                targets: tile,
                scale: 0.85,
                fillColor: 0xBF360C,
                duration: 100,
                yoyo: true,
                onStart: () => playNote(tile.getData('freq')),
                onComplete: () => {
                    tile.setData('active', false);
                    tile.setFillStyle(0x5D4037);
                }
            });
        }

        function playNote(freq) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle'; // 조금 더 묵직한 기타 톤
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
        }

        document.getElementById('start-btn').onclick = function() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') {
                        audioCtx.resume();
                        this.style.display = 'none';
                    }
                });
            } else {
                audioCtx.resume();
                this.style.display = 'none';
            }
        };
    </script>
</body>
</html>
