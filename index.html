<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SONG, YOUNG-MIN Guitar Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #3E2723; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; }
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 22px 45px; font-size: 18px; cursor: pointer; z-index: 1000;
            background: #8D6E63; color: #ffffff; border: 2px solid #5D4037; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
        }
    </style>
</head>
<body>
    <button id="start-btn">SONG, YOUNG-MIN Guitar Lab<br>터치하여 연주 시작</button>

    <script>
        let ball, tiles, audioCtx;
        let accelX = 0, accelY = 0, baseBeta = null;

        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];

        const config = {
            type: Phaser.AUTO,
            backgroundColor: '#3E2723',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: window.innerWidth,
                height: window.innerHeight
            },
            physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
            scene: { create: create, update: update }
        };

        const game = new Phaser.Game(config);

        function create() {
            const { width, height } = this.scale;
            const centerX = width / 2;
            const centerY = height / 2;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // 1. 나무 질감 생성
            const woodG = this.make.graphics({x: 0, y: 0, add: false});
            woodG.fillStyle(0x8D6E63, 1).fillRect(0, 0, 200, 200);
            for(let i=0; i<200; i+=10) {
                woodG.lineStyle(1, 0x5D4037, 0.3);
                woodG.lineBetween(i, 0, i + (Math.random()*12), 200);
            }
            woodG.generateTexture('woodTex', 200, 200);

            // 2. 배경 바닥
            this.add.tileSprite(centerX, centerY, width, height, 'woodTex').setAlpha(0.4);

            // 3. 입체 블록 생성
            tiles = this.add.group();
            const tileSize = Math.min(width, height) * 0.18;

            for (let i = 0; i < 12; i++) {
                let col = i % 3;
                let row = Math.floor(i / 3);
                let x = centerX + (col - 1) * (tileSize * 1.35);
                let y = centerY + (row - 1.5) * (tileSize * 1.35);

                let container = this.add.container(x, y);
                let shadow = this.add.rectangle(5, 5, tileSize, tileSize, 0x000000, 0.4);
                let side = this.add.rectangle(0, 6, tileSize, tileSize, 0x4E342E);
                let top = this.add.sprite(0, 0, 'woodTex').setDisplaySize(tileSize, tileSize);
                
                // 알파벳 텍스트 (기본은 차분한 갈색)
                let txt = this.add.text(0, 0, notes[i], { 
                    fontSize: (tileSize * 0.32) + 'px', 
                    color: '#2D1B18', 
                    fontStyle: 'bold' 
                }).setOrigin(0.5);

                container.add([shadow, side, top, txt]);
                container.setData({ freq: freqs[i], isOver: false, top: top, txt: txt });
                
                this.physics.add.existing(container);
                container.body.setSize(tileSize, tileSize);
                tiles.add(container);
            }

            // 4. 구슬 생성 (유리 재질 느낌)
            const glassG = this.make.graphics({x: 0, y: 0, add: false});
            glassG.lineStyle(2, 0xffffff, 0.6).strokeCircle(25, 25, 23);
            glassG.fillStyle(0xffffff, 0.15).fillCircle(25, 25, 23);
            glassG.fillStyle(0xffffff, 0.6).fillCircle(18, 18, 7);
            glassG.generateTexture('glassBall', 50, 50);

            ball = this.physics.add.sprite(centerX, centerY, 'glassBall');
            ball.setCircle(25).setCollideWorldBounds(true).setBounce(0.5).setDepth(100);

            // 5. 워터마크
            this.add.text(centerX, height - 50, "SONG, YOUNG-MIN Guitar Lab", {
                fontSize: '16px', color: '#ffffff', alpha: 0.5
            }).setOrigin(0.5);

            this.time.addEvent({ delay: 30000, callback: shuffleTiles, callbackScope: this, loop: true });
        }

        function update() {
            if (ball) {
                ball.setVelocityX(accelX * 1.5);
                ball.setVelocityY(accelY * 1.5);

                tiles.getChildren().forEach(container => {
                    const distance = Phaser.Math.Distance.Between(ball.x, ball.y, container.x, container.y);
                    if (distance < 50) {
                        if (!container.getData('isOver')) {
                            container.setData('isOver', true);
                            activateBlock.call(this, container);
                        }
                    } else {
                        if (container.getData('isOver')) {
                            container.setData('isOver', false);
                            deactivateBlock.call(this, container);
                        }
                    }
                });
            }
        }

        function activateBlock(container) {
            const top = container.getAt(2);
            const txt = container.getAt(3);
            
            playFlute(container.getData('freq'));

            // 전구 켜지는 연출: 색상이 밝아지고 그림자 효과 추가
            txt.setColor('#FFF9C4'); // 밝은 전구색
            txt.setShadow(0, 0, '#FFD54F', 15, true, true); // 후광 효과
            
            this.tweens.add({
                targets: [top, txt],
                y: 6,
                duration: 80,
                ease: 'Cubic.out'
            });
        }

        function deactivateBlock(container) {
            const top = container.getAt(2);
            const txt = container.getAt(3);
            
            // 전구 꺼지는 연출: 원래 색상으로 복귀
            txt.setColor('#2D1B18');
            txt.setShadow(0, 0, '#000', 0, false, false);

            this.tweens.add({
                targets: [top, txt],
                y: 0,
                duration: 150,
                ease: 'Back.out'
            });
        }

        function playFlute(freq) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            // 자연스러운 플루트 소리를 위한 3개 배음 레이어링
            const harmonics = [1, 2, 3];
            const gains = [0.12, 0.05, 0.02];

            harmonics.forEach((h, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine'; // 맑은 사인파 기반
                osc.frequency.setValueAtTime(freq * h, now);
                
                // 비브라토(떨림) 추가
                const lfo = audioCtx.createOscillator();
                const lfoGain = audioCtx.createGain();
                lfo.frequency.setValueAtTime(5, now);
                lfoGain.gain.setValueAtTime(freq * 0.005, now);
                lfo.connect(lfoGain);
                lfoGain.connect(osc.frequency);
                lfo.start();

                // 엠벨로프 설정 (부드러운 시작과 여운)
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(gains[i], now + 0.1); // Attack
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2); // Release
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(now + 1.3);
            });
        }

        function shuffleTiles() {
            const centerX = this.scale.width / 2;
            const centerY = this.scale.height / 2;
            const tileSize = Math.min(this.scale.width, this.scale.height) * 0.18;
            let pos = [];
            for (let i = 0; i < 12; i++) {
                let col = i % 3; let row = Math.floor(i / 3);
                pos.push({ x: centerX + (col - 1) * (tileSize * 1.35), y: centerY + (row - 1.5) * (tileSize * 1.35) });
            }
            Phaser.Actions.Shuffle(pos);
            tiles.getChildren().forEach((c, i) => {
                this.tweens.add({ targets: c, x: pos[i].x, y: pos[i].y, duration: 800, ease: 'Power2' });
            });
        }

        const startBtn = document.getElementById('start-btn');
        startBtn.onclick = function() {
            if (audioCtx) audioCtx.resume();
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') {
                            initSensor();
                            startBtn.style.display = 'none';
                        }
                    });
            } else {
                initSensor();
                startBtn.style.display = 'none';
            }
        };

        function initSensor() {
            window.addEventListener('deviceorientation', (e) => {
                if (baseBeta === null) baseBeta = e.beta;
                accelX = e.gamma * 22; 
                accelY = (e.beta - baseBeta) * 22;
            });
        }
    </script>
</body>
</html>
